<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纯音测听虚拟实训平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration"></div>
    <div class="bg-decoration-2"></div>
    
    <!-- 首页导航界面 -->
    <div class="home-container">
        <h1>🎧 纯音测听虚拟实训平台</h1>
        <p class="subtitle">欢迎使用纯音测听实训系统，请选择进入的模块</p>
        
        <div class="module-buttons">
            <button class="module-btn exam-btn" onclick="window.location.href='exam.html'">
                <div class="btn-icon">📝</div>
                <div class="btn-title">考试模块</div>
                <div class="btn-desc">进行正式的纯音测听测试，记录真实测试数据</div>
            </button>
            
            <button class="module-btn practice-btn" onclick="window.location.href='practice.html'">
                <div class="btn-icon">🎯</div>
                <div class="btn-title">练习模块</div>
                <div class="btn-desc">通过预设案例进行模拟测听练习，提升技能</div>
            </button>
        </div>
        
        <div class="features">
            <div class="feature-card">
                <span class="feature-icon">🎵</span>
                <span>专业纯音测听</span>
            </div>
            <div class="feature-card">
                <span class="feature-icon">📊</span>
                <span>AI智能评分</span>
            </div>
            <div class="feature-card">
                <span class="feature-icon">📈</span>
                <span>听力图绘制</span>
            </div>
            <div class="feature-card">
                <span class="feature-icon">📄</span>
                <span>报告导出</span>
            </div>
        </div>
    </div>
</body>
</html>
