<!DOCTYPE html>
<html>
<head>
    <title>3D患者调试工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/loaders/GLTFLoader.js"></script>
    <style>
        body { display: flex; gap: 20px; margin: 0; padding: 20px; font-family: Arial; }
        #container { width: 600px; height: 400px; border: 2px solid blue; }
        .controls { width: 300px; background: #f0f0f0; padding: 15px; border-radius: 8px; }
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="range"] { width: 100%; }
        .value { font-family: monospace; color: #666; }
        button { padding: 8px 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div class="controls">
        <h2>🎛️ 模型调试面板</h2>
        
        <div class="control-group">
            <label>缩放 Scale</label>
            <input type="range" id="scale" min="0.1" max="3" step="0.1" value="1.2">
            <span class="value" id="scaleValue">1.2</span>
        </div>
        
        <div class="control-group">
            <label>位置 X</label>
            <input type="range" id="posX" min="-2" max="2" step="0.1" value="0">
            <span class="value" id="posXValue">0</span>
        </div>
        
        <div class="control-group">
            <label>位置 Y</label>
            <input type="range" id="posY" min="-2" max="2" step="0.1" value="0.2">
            <span class="value" id="posYValue">0.2</span>
        </div>
        
        <div class="control-group">
            <label>位置 Z</label>
            <input type="range" id="posZ" min="-2" max="2" step="0.1" value="0.5">
            <span class="value" id="posZValue">0.5</span>
        </div>
        
        <div class="control-group">
            <label>旋转 X (度)</label>
            <input type="range" id="rotX" min="-180" max="180" step="10" value="-90">
            <span class="value" id="rotXValue">-90°</span>
        </div>
        
        <div class="control-group">
            <label>旋转 Y (度)</label>
            <input type="range" id="rotY" min="-180" max="180" step="10" value="180">
            <span class="value" id="rotYValue">180°</span>
        </div>
        
        <div class="control-group">
            <label>旋转 Z (度)</label>
            <input type="range" id="rotZ" min="-180" max="180" step="10" value="0">
            <span class="value" id="rotZValue">0°</span>
        </div>
        
        <button onclick="reset()">🔄 重置</button>
        <button onclick="applyToPatient3D()">✅ 应用到patient3D.js</button>
        
        <div id="codeOutput" style="margin-top: 15px; padding: 10px; background: #fff; border: 1px solid #ccc; font-family: monospace; font-size: 12px; max-height: 100px; overflow-y: scroll;"></div>
    </div>
    
    <script>
        // 场景设置
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);
        
        const camera = new THREE.PerspectiveCamera(45, 600/400, 0.1, 1000);
        camera.position.set(0, 1.5, 4);
        camera.lookAt(0, 0.5, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(600, 400);
        document.getElementById('container').appendChild(renderer.domElement);
        
        // 光源
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(4, 6, 4);
        scene.add(dirLight);
        
        let patientGroup;
        
        // 加载模型
        const loader = new THREE.GLTFLoader();
        loader.load('models/patient.glb', function(gltf) {
            patientGroup = gltf.scene;
            updateModel();
            scene.add(patientGroup);
            console.log('模型加载成功');
        });
        
        // 控制函数
        function updateModel() {
            if (!patientGroup) return;
            
            const scale = parseFloat(document.getElementById('scale').value);
            const posX = parseFloat(document.getElementById('posX').value);
            const posY = parseFloat(document.getElementById('posY').value);
            const posZ = parseFloat(document.getElementById('posZ').value);
            const rotX = parseFloat(document.getElementById('rotX').value) * Math.PI / 180;
            const rotY = parseFloat(document.getElementById('rotY').value) * Math.PI / 180;
            const rotZ = parseFloat(document.getElementById('rotZ').value) * Math.PI / 180;
            
            patientGroup.scale.set(scale, scale, scale);
            patientGroup.position.set(posX, posY, posZ);
            patientGroup.rotation.set(rotX, rotY, rotZ);
            
            // 更新显示值
            document.getElementById('scaleValue').textContent = scale;
            document.getElementById('posXValue').textContent = posX;
            document.getElementById('posYValue').textContent = posY;
            document.getElementById('posZValue').textContent = posZ;
            document.getElementById('rotXValue').textContent = Math.round(rotX * 180 / Math.PI) + '°';
            document.getElementById('rotYValue').textContent = Math.round(rotY * 180 / Math.PI) + '°';
            document.getElementById('rotZValue').textContent = Math.round(rotZ * 180 / Math.PI) + '°';
            
            // 更新代码输出
            updateCodeOutput();
        }
        
        function updateCodeOutput() {
            const scale = parseFloat(document.getElementById('scale').value);
            const posX = parseFloat(document.getElementById('posX').value);
            const posY = parseFloat(document.getElementById('posY').value);
            const posZ = parseFloat(document.getElementById('posZ').value);
            const rotX = parseFloat(document.getElementById('rotX').value) * Math.PI / 180;
            const rotY = parseFloat(document.getElementById('rotY').value) * Math.PI / 180;
            const rotZ = parseFloat(document.getElementById('rotZ').value) * Math.PI / 180;
            
            const code = `self.patientGroup.scale.set(${scale}, ${scale}, ${scale});\nself.patientGroup.position.set(${posX}, ${posY}, ${posZ});\nself.patientGroup.rotation.set(${rotX.toFixed(4)}, ${rotY.toFixed(4)}, ${rotZ.toFixed(4)});`;
            
            document.getElementById('codeOutput').textContent = code;
        }
        
        function reset() {
            document.getElementById('scale').value = 1.2;
            document.getElementById('posX').value = 0;
            document.getElementById('posY').value = 0.2;
            document.getElementById('posZ').value = 0.5;
            document.getElementById('rotX').value = -90;
            document.getElementById('rotY').value = 180;
            document.getElementById('rotZ').value = 0;
            updateModel();
        }
        
        function applyToPatient3D() {
            alert('请手动将下方代码复制到 patient3D.js 的 loadGLBModel 方法中');
        }
        
        // 添加事件监听
        document.getElementById('scale').addEventListener('input', updateModel);
        document.getElementById('posX').addEventListener('input', updateModel);
        document.getElementById('posY').addEventListener('input', updateModel);
        document.getElementById('posZ').addEventListener('input', updateModel);
        document.getElementById('rotX').addEventListener('input', updateModel);
        document.getElementById('rotY').addEventListener('input', updateModel);
        document.getElementById('rotZ').addEventListener('input', updateModel);
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
