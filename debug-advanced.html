<!DOCTYPE html>
<html>
<head>
    <title>3D患者调试工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/loaders/GLTFLoader.js"></script>
    <style>
        body { display: flex; gap: 20px; margin: 0; padding: 20px; font-family: Arial; }
        #container { width: 600px; height: 450px; border: 2px solid blue; }
        .controls { width: 300px; background: #f0f0f0; padding: 15px; border-radius: 8px; }
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="range"] { width: 100%; }
        input[type="color"] { width: 50px; height: 30px; }
        .value { font-family: monospace; color: #666; }
        button { padding: 8px 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div class="controls">
        <h2>🎛️ 3D患者调试工具</h2>
        
        <div class="control-group">
            <label>缩放 Scale</label>
            <input type="range" id="scale" min="0.1" max="3" step="0.1" value="1.2" oninput="updateModel()">
            <span class="value" id="scaleValue">1.2</span>
        </div>
        
        <div class="control-group">
            <label>位置 X</label>
            <input type="range" id="posX" min="-2" max="2" step="0.1" value="-0.3" oninput="updateModel()">
            <span class="value" id="posXValue">-0.3</span>
        </div>
        
        <div class="control-group">
            <label>位置 Y</label>
            <input type="range" id="posY" min="-2" max="2" step="0.1" value="0.6" oninput="updateModel()">
            <span class="value" id="posYValue">0.6</span>
        </div>
        
        <div class="control-group">
            <label>位置 Z</label>
            <input type="range" id="posZ" min="-2" max="2" step="0.1" value="0.5" oninput="updateModel()">
            <span class="value" id="posZValue">0.5</span>
        </div>
        
        <div class="control-group">
            <label>旋转 X (度)</label>
            <input type="range" id="rotX" min="-180" max="180" step="5" value="30" oninput="updateModel()">
            <span class="value" id="rotXValue">30°</span>
        </div>
        
        <div class="control-group">
            <label>旋转 Y (度)</label>
            <input type="range" id="rotY" min="-180" max="180" step="5" value="90" oninput="updateModel()">
            <span class="value" id="rotYValue">90°</span>
        </div>
        
        <div class="control-group">
            <label>旋转 Z (度)</label>
            <input type="range" id="rotZ" min="-180" max="180" step="5" value="50" oninput="updateModel()">
            <span class="value" id="rotZValue">50°</span>
        </div>
        
        <div class="control-group">
            <label>材质颜色</label>
            <input type="color" id="matColor" value="#ffffff" oninput="updateMaterial()">
        </div>
        
        <div class="control-group">
            <label>金属度</label>
            <input type="range" id="metalness" min="0" max="1" step="0.1" value="0" oninput="updateMaterial()">
            <span class="value" id="metalnessValue">0</span>
        </div>
        
        <div class="control-group">
            <label>粗糙度</label>
            <input type="range" id="roughness" min="0" max="1" step="0.1" value="1" oninput="updateMaterial()">
            <span class="value" id="roughnessValue">1</span>
        </div>
        
        <button onclick="reset()">🔄 重置</button>
        
        <div style="margin-top: 15px; padding: 10px; background: #fff; border: 1px solid #ccc; font-family: monospace; font-size: 11px;">
            <strong>代码输出:</strong><br>
            <div id="codeOutput"></div>
        </div>
    </div>
    
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf5f5f5);
        
        const camera = new THREE.PerspectiveCamera(45, 600/450, 0.1, 1000);
        camera.position.set(0, 1.5, 4);
        camera.lookAt(0, 0.5, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(600, 450);
        document.getElementById('container').appendChild(renderer.domElement);
        
        // 光源
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(4, 6, 4);
        scene.add(dirLight);
        
        let patientGroup;
        
        // 加载模型
        const loader = new THREE.GLTFLoader();
        loader.load('models/patient.glb', function(gltf) {
            patientGroup = gltf.scene;
            updateModel();
            scene.add(patientGroup);
            console.log('模型加载成功');
        });
        
        function updateModel() {
            if (!patientGroup) return;
            
            const scale = parseFloat(document.getElementById('scale').value);
            const posX = parseFloat(document.getElementById('posX').value);
            const posY = parseFloat(document.getElementById('posY').value);
            const posZ = parseFloat(document.getElementById('posZ').value);
            const rotX = parseFloat(document.getElementById('rotX').value) * Math.PI / 180;
            const rotY = parseFloat(document.getElementById('rotY').value) * Math.PI / 180;
            const rotZ = parseFloat(document.getElementById('rotZ').value) * Math.PI / 180;
            
            patientGroup.scale.set(scale, scale, scale);
            patientGroup.position.set(posX, posY, posZ);
            patientGroup.rotation.set(rotX, rotY, rotZ);
            
            // 更新显示
            document.getElementById('scaleValue').textContent = scale;
            document.getElementById('posXValue').textContent = posX;
            document.getElementById('posYValue').textContent = posY;
            document.getElementById('posZValue').textContent = posZ;
            document.getElementById('rotXValue').textContent = document.getElementById('rotX').value + '°';
            document.getElementById('rotYValue').textContent = document.getElementById('rotY').value + '°';
            document.getElementById('rotZValue').textContent = document.getElementById('rotZ').value + '°';
            
            updateCodeOutput();
        }
        
        function updateMaterial() {
            if (!patientGroup) return;
            
            const color = document.getElementById('matColor').value;
            const metalness = parseFloat(document.getElementById('metalness').value);
            const roughness = parseFloat(document.getElementById('roughness').value);
            
            patientGroup.traverse(function(child) {
                if (child.isMesh && child.material) {
                    child.material.color.set(color);
                    child.material.metalness = metalness;
                    child.material.roughness = roughness;
                    child.material.needsUpdate = true;
                }
            });
            
            document.getElementById('metalnessValue').textContent = metalness;
            document.getElementById('roughnessValue').textContent = roughness;
        }
        
        function updateCodeOutput() {
            const scale = parseFloat(document.getElementById('scale').value);
            const posX = parseFloat(document.getElementById('posX').value);
            const posY = parseFloat(document.getElementById('posY').value);
            const posZ = parseFloat(document.getElementById('posZ').value);
            const rotX = parseFloat(document.getElementById('rotX').value) * Math.PI / 180;
            const rotY = parseFloat(document.getElementById('rotY').value) * Math.PI / 180;
            const rotZ = parseFloat(document.getElementById('rotZ').value) * Math.PI / 180;
            
            document.getElementById('codeOutput').textContent = 
                `self.patientGroup.scale.set(${scale}, ${scale}, ${scale});\n` +
                `self.patientGroup.position.set(${posX}, ${posY}, ${posZ});\n` +
                `self.patientGroup.rotation.set(${rotX.toFixed(4)}, ${rotY.toFixed(4)}, ${rotZ.toFixed(4)});`;
        }
        
        function reset() {
            document.getElementById('scale').value = 1.2;
            document.getElementById('posX').value = -0.3;
            document.getElementById('posY').value = 0.6;
            document.getElementById('posZ').value = 0.5;
            document.getElementById('rotX').value = 30;
            document.getElementById('rotY').value = 90;
            document.getElementById('rotZ').value = 50;
            document.getElementById('matColor').value = '#ffffff';
            document.getElementById('metalness').value = 0;
            document.getElementById('roughness').value = 1;
            updateModel();
            updateMaterial();
        }
        
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
